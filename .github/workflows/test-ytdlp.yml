name: Download Video to File

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'הדבק כאן את הקישור לבדיקה'
        required: true
        default: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'

jobs:
  download-video:
    runs-on: ubuntu-latest

    steps:
      - name: Install yt-dlp, Deno & FFmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Save Cookies File
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Download Video File (With Audio)
        run: |
          echo "Downloading video and audio..."
          yt-dlp \
            --cookies cookies.txt \
            -f "bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480][ext=mp4]/best[height<=480]" \
            --merge-output-format mp4 \
            -o "downloaded_video.mp4" \
            "${{ github.event.inputs.youtube_url }}"

      - name: Remove Temporary Cookies
        if: always()
        run: |
          rm -f cookies.txt

      - name: Upload Video as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: "*.mp4"
