name: Test yt-dlp Link Extraction

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'הדבק כאן את הקישור לבדיקה'
        required: true
        default: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'

jobs:
  extract-link:
    runs-on: ubuntu-latest

    steps:
      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Extract Direct Video URL
        run: |
          echo "Fetching direct Google Video URL..."
          DIRECT_URL=$(yt-dlp -g "${{ github.event.inputs.youtube_url }}")
          echo "------------------------------------------------"
          echo "FOUND DIRECT URL:"
          echo "$DIRECT_URL"
          echo "------------------------------------------------"
